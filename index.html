<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도서관 출석 콩콩</title>

<style>

body{
    font-family:"맑은 고딕",sans-serif;
    background:#f7f5ea;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:white;
    width:350px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.squirrel{
    font-size:60px;
    cursor:pointer;
}

h1{
    color:#5f7f55;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    background:#7fa66b;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#6b9158;
}

#result{
    margin-top:20px;
    font-weight:bold;
    color:#5f7f55;
    line-height:1.8;
}

</style>
</head>

<body>

<div class="card">

<div class="squirrel" onclick="secretClick()">
🐿️
</div>

<h1>도서관 출석 콩콩</h1>

<p>
안녕!<br>
나는 책다람쥐 콩이야 🌰<br>
도토리를 모아 책숲을 만들어보자!
</p>

<input
type="text"
id="name"
placeholder="이름">

<input
type="text"
id="birth"
placeholder="생일 (예: 0101)">

<button onclick="checkIn()">
🌰 콩! 출석하기
</button>

<button onclick="showMyAcorns()" style="margin-top:10px;">
🌰 내가 모은 도토리 보기
</button>

<div id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  getDocs
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRpc1AK0Gaf4gynxyXTIn6ZE0utXLD6rg",
  authDomain: "library-kongkong.firebaseapp.com",
  projectId: "library-kongkong",
  storageBucket: "library-kongkong.firebasestorage.app",
  messagingSenderId: "443047968802",
  appId: "1:443047968802:web:326c237815b93f914c0a7b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function getTree(acorns){

    if(acorns >= 30){

        return `
        <div style="font-size:90px">🏆</div>
        <div style="font-size:22px;font-weight:bold;">
        책숲 완성!
        </div>
        <div>
        콩이와 함께 책숲을 만들었어요!
        </div>
        `;
    }

    if(acorns >= 20){

        return `
        <div style="font-size:80px">
        🌳🐿️
        </div>
        <div>
        콩이가 찾아왔어요!
        </div>
        `;
    }

    if(acorns >= 15){

        return `
        <div style="font-size:75px">
        🌳
        </div>
        <div>
        튼튼한 나무
        </div>
        `;
    }

    if(acorns >= 10){

        return `
        <div style="font-size:65px">
        🌿
        </div>
        <div>
        무럭무럭 자라는 나무
        </div>
        `;
    }

    if(acorns >= 5){

        return `
        <div style="font-size:55px">
        🌱
        </div>
        <div>
        새싹이 자라고 있어요
        </div>
        `;
    }

    return `
    <div style="font-size:45px">
    🌰
    </div>
    <div>
    도토리를 모으는 중!
    </div>
    `;
}

function getProgressBar(acorns){

    let percent =
    Math.min(acorns,30);

    let filled =
    Math.floor(percent / 30 * 20);

    let empty =
    20 - filled;

    return (
        "🟩".repeat(filled) +
        "⬜".repeat(empty)
    );
}


async function checkIn(){

    let name =
    document.getElementById("name").value.trim();

    let birth =
    document.getElementById("birth").value.trim();

    if(name==""){
        alert("이름을 입력해주세요!");
        return;
    }

    if(birth==""){
        alert("생일을 입력해주세요!");
        return;
    }

    let userId =
    name + "_" + birth;

    let today =
    new Date().toLocaleDateString("ko-KR");

    let userRef =
    doc(db,"participants",userId);

    let userSnap =
    await getDoc(userRef);

    let acornCount = 0;
    let lastCheckIn = "";

    if(userSnap.exists()){

        let data =
        userSnap.data();

        acornCount =
        data.acorns || 0;

        lastCheckIn =
        data.lastDate || "";
    }

    if(lastCheckIn == today){

        document.getElementById("result").innerHTML =
        "🐿️<br><br>" +
        name +
        " 친구!<br>" +
        "오늘은 이미 출석했어 😊<br><br>" +
        "🌰 ".repeat(acornCount) +
        "<br>총 " +
        acornCount +
        "개";

        return;
    }

    acornCount++;

    await setDoc(userRef,{
        name:name,
        birth:birth,
        acorns:acornCount,
        lastDate:today
    });

let tree = getTree(acornCount);

let progress =
getProgressBar(acornCount);

document.getElementById("result").innerHTML =
"🎉 출석 완료!<br><br>" +
tree +
"<br>" +
name +
" 친구!<br><br>" +
"🔥 " +
acornCount +
"일째 출석 중<br><br>" +
progress +
"<br>" +
acornCount +
" / 30일<br><br>" +
"🌰 ".repeat(Math.min(acornCount,20)) +
"<br><br>총 " +
acornCount +
"개";
}
let secretCount = 0;

function secretClick(){

    secretCount++;

    if(secretCount >= 5){

        secretCount = 0;

        adminLogin();
    }
}

function adminLogin(){

    let pw =
    prompt("관리자 비밀번호를 입력하세요");

   if(pw !== "0509"){

    alert("비밀번호가 틀렸습니다.");

    return;
}

showAdminPage();
}

async function showAdminPage(){

    const snapshot =
    await getDocs(collection(db,"participants"));

    let totalAcorns = 0;
    let completeUsers = 0;

    let html =
    "<h3>📋 관리자 페이지</h3>";

    html +=
    "<div style='text-align:left;'>";

    snapshot.forEach(docSnap => {

        const data =
        docSnap.data();

        const acorns =
        data.acorns || 0;

        totalAcorns += acorns;

        if(acorns >= 30){
            completeUsers++;
        }

        html +=
        "👦 " +
        data.name +
        " (" +
        data.birth +
        ") 🌰 " +
        acorns +
        "개<br>";
    });

    html += "<hr>";

    html +=
    "👥 총 참가자 : " +
    snapshot.size +
    "명<br>";

    html +=
    "🌰 총 도토리 : " +
    totalAcorns +
    "개<br>";

    html +=
    "🏆 완주자 : " +
    completeUsers +
    "명";

    html += "</div>";

    document.getElementById("result").innerHTML =
    html;
}

async function showMyAcorns(){

    let name =
    document.getElementById("name").value.trim();

    let birth =
    document.getElementById("birth").value.trim();

    if(name==""){
        alert("이름을 입력해주세요!");
        return;
    }

    if(birth==""){
        alert("생일을 입력해주세요!");
        return;
    }

    let userId =
    name + "_" + birth;

    let userRef =
    doc(db,"participants",userId);

    let userSnap =
    await getDoc(userRef);

    let acorns = 0;

    if(userSnap.exists()){

        let data =
        userSnap.data();

        acorns =
        data.acorns || 0;
    }

let tree = getTree(acorns);

let progress =
getProgressBar(acorns);

document.getElementById("result").innerHTML =
tree +
"<br>" +
name +
" 친구의 도토리<br><br>" +
"🔥 " +
acorns +
"일째 출석 중<br><br>" +

"<div style='font-size:18px'>" +
progress +
"</div>" +

"<br>" +

"<b>" +
acorns +
" / 30일</b><br><br>"
"🌰 ".repeat(Math.min(acorns,20)) +
"<br><br>총 " +
acorns +
"개";
}

window.checkIn = checkIn;
window.secretClick = secretClick;
window.showMyAcorns = showMyAcorns;
window.showAdminPage = showAdminPage;
</script>

</body>
</html>
